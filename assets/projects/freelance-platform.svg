<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="360" cy="620" r="260" fill="url(#accent)" filter="url(#soft)" opacity="0.45"/>
  <circle cx="1120" cy="260" r="220" fill="url(#accent)" filter="url(#soft)" opacity="0.35"/>

  <!-- app layout -->
  <g opacity="0.95">
    <rect x="170" y="210" width="1060" height="500" rx="28" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <rect x="210" y="260" width="320" height="400" rx="18" fill="rgba(255,255,255,0.06)"/>
    <rect x="560" y="260" width="630" height="170" rx="18" fill="rgba(255,255,255,0.06)"/>
    <rect x="560" y="460" width="630" height="200" rx="18" fill="rgba(255,255,255,0.06)"/>

    <!-- avatar + status -->
    <circle cx="270" cy="320" r="38" fill="url(#accent)" opacity="0.9"/>
    <rect x="320" y="300" width="170" height="14" rx="7" fill="rgba(255,255,255,0.55)"/>
    <rect x="320" y="328" width="120" height="12" rx="6" fill="rgba(255,255,255,0.28)"/>

    <!-- buttons -->
    <rect x="940" y="300" width="210" height="44" rx="22" fill="url(#accent)" opacity="0.9"/>
    <rect x="940" y="360" width="210" height="44" rx="22" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- title -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" fill="#ffffff">
    <text x="180" y="150" font-size="44" font-weight="700" letter-spacing="0.2">Freelance Client Platform</text>
    <text x="180" y="190" font-size="22" opacity="0.75">Auth " projects " messaging</text>
  </g>
</svg>
