<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="280" cy="640" r="260" fill="url(#accent)" filter="url(#soft)" opacity="0.35"/>
  <circle cx="1150" cy="260" r="240" fill="url(#accent)" filter="url(#soft)" opacity="0.30"/>

  <!-- terminal -->
  <g opacity="0.95">
    <rect x="160" y="230" width="1080" height="470" rx="28" fill="#0b0f19" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <rect x="160" y="230" width="1080" height="70" rx="28" fill="rgba(255,255,255,0.05)"/>
    <circle cx="210" cy="265" r="10" fill="rgba(255,255,255,0.18)"/>
    <circle cx="245" cy="265" r="10" fill="rgba(255,255,255,0.18)"/>
    <circle cx="280" cy="265" r="10" fill="rgba(255,255,255,0.18)"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="26" fill="rgba(255,255,255,0.78)">
      <text x="220" y="355">&gt; optimize --input data.csv --threads 8</text>
      <text x="220" y="400" fill="rgba(255,255,255,0.55)">running...</text>
      <text x="220" y="470" fill="url(#accent)"> done   1.92s   peak mem 38MB</text>
      <text x="220" y="540" fill="rgba(255,255,255,0.55)">&gt; report --format json</text>
      <text x="220" y="585" fill="rgba(255,255,255,0.78)">{ "speedup": "3.4x", "errors": 0 }</text>
    </g>
  </g>

  <!-- title -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" fill="#ffffff">
    <text x="180" y="150" font-size="44" font-weight="700" letter-spacing="0.2">Open Source CLI Tool</text>
    <text x="180" y="190" font-size="22" opacity="0.75">Fast " reliable " C++</text>
  </g>
</svg>
