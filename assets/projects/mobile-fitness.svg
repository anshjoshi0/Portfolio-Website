<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="370" cy="290" r="240" fill="url(#accent)" filter="url(#soft)" opacity="0.45"/>
  <circle cx="1060" cy="650" r="280" fill="url(#accent)" filter="url(#soft)" opacity="0.32"/>

  <!-- phone -->
  <g opacity="0.98">
    <rect x="520" y="160" width="360" height="610" rx="56" fill="#0b0f19" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
    <rect x="560" y="220" width="280" height="480" rx="28" fill="rgba(255,255,255,0.06)"/>
    <rect x="650" y="190" width="100" height="14" rx="7" fill="rgba(255,255,255,0.22)"/>

    <!-- rings -->
    <circle cx="700" cy="440" r="110" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="18"/>
    <circle cx="700" cy="440" r="110" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"
            stroke-dasharray="520" stroke-dashoffset="160"/>
    <circle cx="700" cy="440" r="78" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="14"/>
    <circle cx="700" cy="440" r="78" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="380" stroke-dashoffset="90" opacity="0.9"/>
  </g>

  <!-- title -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" fill="#ffffff">
    <text x="180" y="150" font-size="44" font-weight="700" letter-spacing="0.2">Mobile Fitness App</text>
    <text x="180" y="190" font-size="22" opacity="0.75">Workouts " tracking " goals</text>
  </g>
</svg>
