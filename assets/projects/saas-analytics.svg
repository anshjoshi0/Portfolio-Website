<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="48" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="320" cy="260" r="210" fill="url(#accent)" filter="url(#soft)" opacity="0.55"/>
  <circle cx="1120" cy="640" r="240" fill="url(#accent)" filter="url(#soft)" opacity="0.35"/>

  <!-- dashboard cards -->
  <g opacity="0.95">
    <rect x="160" y="200" width="1080" height="520" rx="28" fill="#0b0f19" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <rect x="210" y="250" width="360" height="180" rx="18" fill="rgba(255,255,255,0.06)"/>
    <rect x="610" y="250" width="580" height="180" rx="18" fill="rgba(255,255,255,0.06)"/>
    <rect x="210" y="470" width="980" height="200" rx="18" fill="rgba(255,255,255,0.06)"/>

    <!-- chart bars -->
    <g transform="translate(245 520)" fill="url(#accent)">
      <rect x="0" y="70" width="34" height="80" rx="10" opacity="0.85"/>
      <rect x="54" y="30" width="34" height="120" rx="10" opacity="0.8"/>
      <rect x="108" y="90" width="34" height="60" rx="10" opacity="0.75"/>
      <rect x="162" y="10" width="34" height="140" rx="10" opacity="0.9"/>
      <rect x="216" y="55" width="34" height="95" rx="10" opacity="0.78"/>
    </g>
  </g>

  <!-- title -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" fill="#ffffff">
    <text x="180" y="150" font-size="44" font-weight="700" letter-spacing="0.2">SaaS Analytics Dashboard</text>
    <text x="180" y="190" font-size="22" opacity="0.75">Insights " charts " KPIs</text>
  </g>
</svg>
